<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text 2 Emoji - Emotion Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="header-badge">AI Emotion Detector</span>
            <h1>Text 2 Emoji</h1>
            <p>Transform your emotions into expressive emojis powered by AI</p>
        </div>

        <div class="main-card">
            <div class="input-group">
                <label class="input-label">Enter Your Text</label>
                <div class="input-wrapper">
                    <input id="ip" type="text" placeholder="Share your thoughts, feelings, or emotions...">
                </div>
            </div>

            <div class="button-container">
                <button id="btn">Generate Emoji</button>
            </div>

            <div class="output-section">
                <span class="output-label">Your Emotion</span>
                <div class="emoji">😊</div>
                <div class="emotion-text">Detect the emotion!</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
